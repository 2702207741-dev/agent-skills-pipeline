name: External Action Self-Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-consumer-matrix:
    name: Validate ${{ matrix.fixture }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        fixture: [python-library, javascript-library, documentation-site]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run local composite Action as an external consumer
        id: our-skills
        uses: ./
        with:
          workspace: examples/external-repos/${{ matrix.fixture }}
          registry: skills.json
          mode: all
          output-directory: .our-skills-dist
          upload-artifact: "false"

      - name: Run fixture-owned test
        shell: bash
        env:
          FIXTURE: ${{ matrix.fixture }}
        run: |
          cd "examples/external-repos/$FIXTURE"
          case "$FIXTURE" in
            python-library) python -m unittest discover -s tests -v ;;
            javascript-library) node --test ;;
            documentation-site) test -f docs/release-checklist.md ;;
          esac

      - name: Verify Action outputs
        shell: bash
        env:
          INTERFACE_VERSION: ${{ steps.our-skills.outputs.interface-version }}
          GATE_STATUS: ${{ steps.our-skills.outputs.status }}
          SKILL_COUNT: ${{ steps.our-skills.outputs.skill-count }}
          REPORT_PATH: ${{ steps.our-skills.outputs.report-path }}
          ARTIFACT_PATH: ${{ steps.our-skills.outputs.artifact-path }}
          MANIFEST_PATH: ${{ steps.our-skills.outputs.manifest-path }}
          CHECKSUM_PATH: ${{ steps.our-skills.outputs.checksum-path }}
        run: |
          test "$INTERFACE_VERSION" = "1"
          test "$GATE_STATUS" = "pass"
          test "$SKILL_COUNT" = "1"
          test -f "$REPORT_PATH"
          test -f "$ARTIFACT_PATH"
          test -f "$MANIFEST_PATH"
          test -f "$CHECKSUM_PATH"

      - name: Verify unified POSIX launcher
        if: ${{ matrix.os != 'windows-latest' }}
        run: ./our-skills --version

      - name: Verify unified Windows launcher
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: .\our-skills.cmd --version

  external-consumer:
    name: Validate external consumer fixture
    if: ${{ always() }}
    needs: external-consumer-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Require the complete portability matrix
        env:
          MATRIX_RESULT: ${{ needs.external-consumer-matrix.result }}
        run: test "$MATRIX_RESULT" = "success"

  pinned-external-reference:
    name: Validate pinned remote consumer interface
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer fixture
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run immutable external Action reference
        id: our-skills
        uses: 2702207741-dev/agent-skills-pipeline@d62571b5d6ce0ba1e36c94d074575aef4c7c19c3
        with:
          workspace: examples/external-repos/python-library
          registry: skills.json
          mode: all
          output-directory: .our-skills-dist-pinned
          artifact-name: external-python-library-pinned-release

      - name: Verify pinned Action outputs
        env:
          GATE_STATUS: ${{ steps.our-skills.outputs.status }}
          SKILL_COUNT: ${{ steps.our-skills.outputs.skill-count }}
          ARTIFACT_PATH: ${{ steps.our-skills.outputs.artifact-path }}
          MANIFEST_PATH: ${{ steps.our-skills.outputs.manifest-path }}
          CHECKSUM_PATH: ${{ steps.our-skills.outputs.checksum-path }}
        run: |
          test "$GATE_STATUS" = "pass"
          test "$SKILL_COUNT" = "1"
          test -f "$ARTIFACT_PATH"
          test -f "$MANIFEST_PATH"
          test -f "$CHECKSUM_PATH"
