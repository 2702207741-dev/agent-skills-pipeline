name: CI

on:
  push:
  pull_request:

env:
  PYTHONDONTWRITEBYTECODE: "1"

permissions:
  contents: read

jobs:
  quality:
    name: Quality contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Validate repository contracts
        run: |
          python scripts/check_registry.py
          python scripts/validate-skill.py */SKILL.md
          python scripts/run_fixture_checks.py
          python scripts/check_skill_graph.py
          python scripts/generate_platform_reports.py --check
          python scripts/generate_example_dataset.py --check
          python scripts/check_ecosystem.py
          python scripts/check_publication_ready.py
          git diff --check

  security:
    name: Security contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Run security and supply-chain gates
        run: |
          python scripts/security_scan.py
          python scripts/check_supply_chain.py

  evidence:
    name: Evidence contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Replay deterministic and observed evidence channels
        run: |
          python scripts/check_maintenance_evidence.py --no-replay
          python scripts/check_live_maintenance_evidence.py --no-replay
          python scripts/run_rigorbench.py
          python scripts/run_model_eval.py --check

  compatibility:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - name: Run standard-library unit tests
        run: python -m unittest discover -s tests -v

  lifecycle:
    name: ${{ matrix.platform }} lifecycle on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        platform: [codex, claude-code, cursor, hermes]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Install, diagnose, update, and roll back
        run: |
          python scripts/marketplace.py install --platform ${{ matrix.platform }} --target-root "${{ runner.temp }}/market-home" --apply
          python scripts/marketplace.py doctor --platform ${{ matrix.platform }} --target-root "${{ runner.temp }}/market-home" --strict
          python scripts/marketplace.py update --platform ${{ matrix.platform }} --target-root "${{ runner.temp }}/market-home" --skill skill-review-workflow --apply
          python scripts/marketplace.py rollback --platform ${{ matrix.platform }} --target-root "${{ runner.temp }}/market-home" --skill skill-review-workflow --apply

  release:
    name: Release contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Verify release and external adoption contracts
        run: |
          python scripts/check_external_adoption.py
          python scripts/check_release_archive.py
          python scripts/verify_release.py

  validate:
    name: validate
    if: ${{ always() }}
    needs: [quality, security, evidence, compatibility, lifecycle, release]
    runs-on: ubuntu-latest
    steps:
      - name: Require every independent CI surface
        env:
          QUALITY: ${{ needs.quality.result }}
          SECURITY: ${{ needs.security.result }}
          EVIDENCE: ${{ needs.evidence.result }}
          COMPATIBILITY: ${{ needs.compatibility.result }}
          LIFECYCLE: ${{ needs.lifecycle.result }}
          RELEASE: ${{ needs.release.result }}
        run: |
          test "$QUALITY" = "success"
          test "$SECURITY" = "success"
          test "$EVIDENCE" = "success"
          test "$COMPATIBILITY" = "success"
          test "$LIFECYCLE" = "success"
          test "$RELEASE" = "success"
