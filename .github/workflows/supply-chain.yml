name: Supply Chain

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-sign-attest:
    name: Build, sign, and attest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      release: ${{ steps.bundle.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Verify source tree
        run: python scripts/verify_release.py

      - name: Build release bundle and SLSA statement
        id: bundle
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          mkdir -p dist-release
          python scripts/create_release.py --output dist-release
          RELEASE="v$(python -c 'import json; print(json.load(open("skills.json"))["version"])')"
          if [ "$GITHUB_EVENT_NAME" = "release" ] && [ "$RELEASE" != "$RELEASE_TAG" ]; then
            echo "release tag $RELEASE_TAG does not match registry release $RELEASE" >&2
            exit 1
          fi
          ARTIFACT="dist-release/our-skills-$RELEASE.zip"
          python scripts/generate_slsa_provenance.py \
            --artifact "$ARTIFACT" \
            --output "dist-release/our-skills-$RELEASE.slsa-provenance.json" \
            --source-uri "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            --source-commit "$GITHUB_SHA" \
            --workflow-ref "$GITHUB_WORKFLOW_REF" \
            --invocation-id "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/attempts/$GITHUB_RUN_ATTEMPT" \
            --byproduct "dist-release/our-skills-$RELEASE.manifest.json" \
            --byproduct "dist-release/our-skills-$RELEASE.sha256" \
            --byproduct "dist-release/our-skills-$RELEASE.sbom.json" \
            --byproduct "dist-release/our-skills-$RELEASE.provenance.json"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifact with GitHub OIDC
        env:
          ARTIFACT: ${{ steps.bundle.outputs.artifact }}
        run: |
          BUNDLE="${ARTIFACT%.zip}.sigstore.json"
          cosign sign-blob --yes --bundle "$BUNDLE" "$ARTIFACT"

      - name: Verify Sigstore identity bundle
        env:
          ARTIFACT: ${{ steps.bundle.outputs.artifact }}
        run: |
          BUNDLE="${ARTIFACT%.zip}.sigstore.json"
          IDENTITY="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/.github/workflows/supply-chain.yml@$GITHUB_REF"
          cosign verify-blob "$ARTIFACT" \
            --bundle "$BUNDLE" \
            --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Create GitHub artifact attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.bundle.outputs.artifact }}

      - name: Upload signed release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-release-${{ steps.bundle.outputs.release }}-${{ github.sha }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 30

  attach-to-release:
    name: Attach verified bundle to release
    if: github.event_name == 'release'
    needs: build-sign-attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-release-${{ needs.build-sign-attest.outputs.release }}-${{ github.sha }}
          path: dist-release

      - name: Upload immutable release evidence
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist-release/* --repo "$GITHUB_REPOSITORY"
