name: Bug report
description: Report a reproducible problem with a skill, script, report, or installer.
title: "Bug: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Skill behavior or triggering
        - Validation, replay, or reports
        - Marketplace install, update, rollback, or doctor
        - Release artifact or provenance
        - Documentation or contributor workflow
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Project version or commit
      description: Include a release version, commit SHA, or branch name.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and agent platform when relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include minimal commands, prompts, fixture ids, or replay case ids. Remove secrets and private data.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Maintainer impact and severity
      description: Explain whether this blocks review, verification, installation, release, or safe operation.
    validations:
      required: true
  - type: dropdown
    id: data_classification
    attributes:
      label: Data classification of this report
      options:
        - Public only
        - Internal details removed
        - Security-sensitive - report privately instead
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, personal data, private logs, and proprietary source.
          required: true
