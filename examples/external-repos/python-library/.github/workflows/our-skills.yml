name: Agent Skill Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate and package repository-owned skills
        uses: 2702207741-dev/agent-skills-pipeline@8f7976636bb44899ea54e97d01884c4509f00b00
        with:
          mode: all
          artifact-name: sample-python-library-skills
